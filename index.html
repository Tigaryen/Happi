<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#10b981" />

    <title>Happi | AI Agency — Future-Proof Your Business</title>
    <meta name="description" content="Happi is a Manchester-based AI agency helping UK businesses automate workflows, upskill teams, and build conversion-focused websites. Book a free discovery call today." />

    <!-- Canonical -->
    <link rel="canonical" href="https://happiai.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://happiai.co.uk/" />
    <meta property="og:title" content="Happi | AI Agency — Future-Proof Your Business" />
    <meta property="og:description" content="Manchester-based AI agency helping UK businesses automate workflows, upskill teams, and build conversion-focused websites. Book a free discovery call." />
    <meta property="og:site_name" content="Happi" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Happi | AI Agency — Future-Proof Your Business" />
    <meta name="twitter:description" content="Manchester-based AI agency helping UK businesses automate workflows, upskill teams, and build conversion-focused websites." />

    <!-- Font: preconnect + preload + stylesheet in HTML so browser discovers
         it immediately, not buried in JS → CSS → @import chain -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preload" as="style" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Happi",
      "description": "AI agency helping UK businesses automate workflows, upskill teams, and build conversion-focused websites.",
      "url": "https://happiai.co.uk",
      "email": "hello@happiai.co.uk",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Manchester",
        "addressCountry": "GB"
      },
      "areaServed": "GB",
      "serviceType": ["AI Education", "Business Automation", "Web Design", "Branding"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
