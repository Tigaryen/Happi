    <!-- Open Graph -->

    <!-- Font: preconnect + preload + stylesheet in HTML so browser discovers
         it immediately, not buried in JS → CSS → @import chain -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preload" as="style" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" />

    <!-- Meta Pixel -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', 'PIXEL_ID_HERE');
    fbq('track', 'PageView');
    </script>

    <!-- Structured Data -->
